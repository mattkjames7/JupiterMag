name: Release Package

on:
  workflow_dispatch:
    inputs:
      test:
        description: "Publish to TestPyPI"
        required: false
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  get_version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.get_version.outputs.version }}
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Get version from JupiterMag/__init__.py
        id: get_version
        run: |
          version=$(python3 - <<'PY'
          import re
          from pathlib import Path

          text = Path('JupiterMag/__init__.py').read_text(encoding='utf-8')
          m = re.search(r"__version__\s*=\s*['\"]([^'\"]+)['\"]", text)
          if not m:
              raise SystemExit('Could not find __version__ in JupiterMag/__init__.py')
          print(f"v{m.group(1)}")
          PY
          )
          echo "Found version: ${version}"
          echo "version=${version}" >> "$GITHUB_OUTPUT"

  tag:
    runs-on: ubuntu-latest
    needs: get_version
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

      - name: Check if tag exists
        run: |
          tag="${{ needs.get_version.outputs.version }}"
          if git rev-parse "$tag" >/dev/null 2>&1; then
            echo "Tag $tag already exists"
            exit 1
          fi

      - name: Create and push tag
        run: |
          tag="${{ needs.get_version.outputs.version }}"
          git tag "$tag"
          git push origin "$tag"

  build_artifacts:
    needs: [tag, get_version]
    uses: ./.github/workflows/ci.yml
    secrets: inherit

  release:
    runs-on: ubuntu-latest
    needs:
      - get_version
      - build_artifacts
    permissions:
      contents: write
    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: release-artifacts
          merge-multiple: true

      - name: List artifacts
        run: |
          find release-artifacts -type f | sort

      - name: Create GitHub release and upload assets
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          tag_name: ${{ needs.get_version.outputs.version }}
          name: Release ${{ needs.get_version.outputs.version }}
          draft: false
          prerelease: false
          files: |
            release-artifacts/*

  publish_testpypi:
    runs-on: ubuntu-latest
    if: inputs.test
    needs:
      - build_artifacts
    steps:
      - name: Download distribution artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: dist
          merge-multiple: true

      - name: List distributions
        run: |
          find dist -type f | sort

      - name: Publish package distributions to TestPyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0
        with:
          user: __token__
          password: ${{ secrets.TEST_PYPI_API_TOKEN }}
          repository-url: https://test.pypi.org/legacy/

  publish_pypi:
    runs-on: ubuntu-latest
    if: ${{ !inputs.test }}
    needs:
      - build_artifacts
      - release
    steps:
      - name: Download distribution artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: dist
          merge-multiple: true

      - name: List distributions
        run: |
          find dist -type f | sort

      - name: Publish package distributions to PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0
        with:
          user: __token__
          password: ${{ secrets.PYPI_API_TOKEN }}
