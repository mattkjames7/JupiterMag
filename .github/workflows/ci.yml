name: CI

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test-linux:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          submodules: recursive

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake g++ ninja-build

      - name: Build source distribution
        run: |
          python -m pip install --upgrade pip
          python -m pip install build
          python -m build --sdist

      - name: Create venv and install package
        run: |
          python -m venv .venv
          . .venv/bin/activate
          python -m pip install --upgrade pip
          python -m pip install pytest dist/*.tar.gz

      - name: Run pytest from tests directory
        run: |
          . .venv/bin/activate
          cd tests
          pytest -q

  test-macos:
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          submodules: recursive

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"

      - name: Install system dependencies
        run: |
          brew update
          brew install libtool

      - name: Build source distribution
        run: |
          python -m pip install --upgrade pip
          python -m pip install build
          python -m build --sdist

      - name: Create venv and install package
        run: |
          python -m venv .venv
          . .venv/bin/activate
          python -m pip install --upgrade pip
          python -m pip install pytest dist/*.tar.gz

      - name: Run pytest from tests directory
        run: |
          . .venv/bin/activate
          cd tests
          pytest -q

  test-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          submodules: recursive

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"

      - name: Set up MSYS2 toolchain
        uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          path-type: inherit
          update: true
          install: >-
            mingw-w64-ucrt-x86_64-gcc
            make

      - name: Build source distribution
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          python -m pip install build
          python -m build --sdist

      - name: Create venv and install package
        shell: pwsh
        run: |
          python -m venv .venv
          .\.venv\Scripts\Activate.ps1
          python -m pip install --upgrade pip
          python -m pip install pytest (Get-ChildItem dist\*.tar.gz | Select-Object -First 1).FullName

          # debug packaged DLLs and runtime dependencies
          $pkgRoot = ".\.venv\Lib\site-packages\JupiterMag"
          $libRoot = Join-Path $pkgRoot "__data\libjupitermag"
          $mainDll = Join-Path $libRoot "lib\libjupitermag.dll"

          Write-Host "Package root: $pkgRoot"
          Write-Host "lib root: $libRoot"
          Write-Host "main dll: $mainDll"

          if (Test-Path $pkgRoot) {
            Write-Host "JupiterMag package tree (depth 2):"
            Get-ChildItem $pkgRoot -Depth 2
          } else {
            Write-Warning "Package root does not exist: $pkgRoot"
          }

          if (Test-Path $libRoot) {
            Write-Host "All packaged DLLs:"
            Get-ChildItem $libRoot -Recurse -Filter *.dll | Select-Object FullName
          } else {
            Write-Warning "Library root does not exist: $libRoot"
          }

          if (Test-Path $mainDll) {
            Write-Host "Found libjupitermag.dll"
          } else {
            Write-Warning "Missing libjupitermag.dll at expected location"
          }

          Write-Host "MSYS2 runtime locations:"
          Get-ChildItem C:\msys64\ucrt64\bin\libstdc++*.dll -ErrorAction SilentlyContinue
          Get-ChildItem C:\msys64\ucrt64\bin\libgcc_s*.dll -ErrorAction SilentlyContinue
          Get-ChildItem C:\msys64\ucrt64\bin\libwinpthread*.dll -ErrorAction SilentlyContinue

          Write-Host "where.exe results for runtime DLLs:"
          foreach ($dll in @("libstdc++-6.dll", "libgcc_s_seh-1.dll", "libwinpthread-1.dll")) {
            where.exe $dll
            if ($LASTEXITCODE -ne 0) {
              Write-Warning "Could not resolve $dll via PATH"
            }
          }

          Write-Host "PATH entries containing msys/mingw:"
          ($env:PATH -split ';') | Where-Object { $_ -match 'msys|mingw|ucrt' }

      - name: Run pytest from tests directory
        shell: pwsh
        run: |
          .\.venv\Scripts\Activate.ps1
          Set-Location tests
          pytest -q